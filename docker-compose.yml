version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: reconeye
      POSTGRES_USER: reconeye
      POSTGRES_PASSWORD: reconeye
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reconeye"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  django:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: bash docker/entrypoint.sh
    environment:
      DEBUG: "False"
      SECRET_KEY: "change-me-in-production"
      ALLOWED_HOSTS: "localhost,127.0.0.1"
      DATABASE_URL: "postgres://reconeye:reconeye@postgres:5432/reconeye"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      CACHE_URL: "redis://redis:6379/3"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/staticfiles

  celery_worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config.celery worker -l info --concurrency=2
    environment:
      DEBUG: "False"
      SECRET_KEY: "change-me-in-production"
      DATABASE_URL: "postgres://reconeye:reconeye@postgres:5432/reconeye"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      CACHE_URL: "redis://redis:6379/3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

  celery_beat:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: celery -A config.celery beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      DEBUG: "False"
      SECRET_KEY: "change-me-in-production"
      DATABASE_URL: "postgres://reconeye:reconeye@postgres:5432/reconeye"
      REDIS_URL: "redis://redis:6379/0"
      CELERY_BROKER_URL: "redis://redis:6379/1"
      CELERY_RESULT_BACKEND: "redis://redis:6379/2"
      CACHE_URL: "redis://redis:6379/3"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app

volumes:
  postgres_data:
