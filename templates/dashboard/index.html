{% extends "base.html" %}
{% block title %}Dashboard — ReconEye{% endblock %}

{% block content %}
<div class="row mb-4">
  <div class="col">
    <h4><i class="bi bi-speedometer2 me-2 text-info"></i>Dashboard</h4>
  </div>
</div>

{# Stats cards — auto-refresh every 30s via HTMX #}
<div
  id="dashboard-stats"
  hx-get="{% url 'dashboard_htmx:htmx_stats' %}"
  hx-trigger="load, every 30s"
  hx-swap="innerHTML"
>
  {% include "htmx/dashboard/_stats.html" %}
</div>

{# Active jobs table #}
<div class="row mt-2">
  <div class="col">
    <div class="card stat-card">
      <div class="card-header d-flex justify-content-between align-items-center">
        <span><i class="bi bi-arrow-repeat me-1"></i>Active Scrape Jobs</span>
        <a href="{% url 'scraping:job_list' %}" class="btn btn-sm btn-outline-secondary">View all</a>
      </div>
      <div
        id="active-jobs"
        hx-get="{% url 'scraping_htmx:htmx_jobs' %}"
        hx-trigger="load, every 10s"
        hx-swap="innerHTML"
        class="card-body p-0"
      >
        <p class="p-3 text-muted small">Loading…</p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
