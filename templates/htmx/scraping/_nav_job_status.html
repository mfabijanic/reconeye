{% if active_job_count > 0 %}
<span
  class="badge nav-job-badge ms-1"
  title="{{ active_job_count }} job{{ active_job_count|pluralize }} running"
>
  <span class="spinner-grow spinner-grow-sm me-1" role="status" aria-hidden="true" style="width:.55rem;height:.55rem;"></span>{{ active_job_count }}
</span>
{% endif %}
