{% if checking %}
<span id="camera-status-badge"
  hx-get="{% url 'cameras_htmx:check_stream' camera.pk %}?check_started={{ check_started }}"
  hx-trigger="every 3s"
  hx-swap="outerHTML"
>
  <span class="badge text-bg-warning">
    <span class="spinner-border spinner-border-sm me-1" role="status" aria-hidden="true"></span>Checking...
  </span>
  {% if task_id %}<small class="text-muted ms-2" title="Task ID: {{ task_id }}">Task: {{ task_id|truncatechars:8 }}</small>{% endif %}
</span>
{% else %}
<span id="camera-status-badge">
  {% if camera.is_online %}
    <span class="badge badge-online">Online</span>
  {% else %}
    <span class="badge badge-offline">Offline</span>
  {% endif %}
  {% if camera.last_checked %}
    <small class="text-muted ms-2">{{ camera.last_checked|timesince }} ago</small>
  {% endif %}
</span>
{% endif %}
